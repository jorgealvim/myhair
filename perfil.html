<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Painel do Profissional</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #fce4ec; --blue: #b3e5fc; --dark-blue: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--pink); margin: 0; color: #333; min-height: 100vh; padding: 20px; }
        .page-shell { width: 100%; max-width: 320px; margin: 0 auto; }
        .login-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); width: 100%; box-sizing: border-box; }
        header { padding: 0 0 12px; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 12px; }
        
        /* Dados Básicos */
        .perfil-resumo { background: #fff; margin: 0 0 12px; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; box-shadow: inset 0 0 0 1px #f1f1f1; }
        .avatar { width: 36px; height: 36px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .resumo-acoes { margin-left: auto; display: flex; align-items: center; }
        .btn-favorito { background: #fff7d6; color: #8a6a00; border: 1px solid #f5df8f; border-radius: 8px; padding: 8px 10px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .btn-favorito.ativo { background: #ffe48a; color: #5b4700; }
        .info-basica h3 { margin: 0; font-size: 13px; }
        .info-basica p { margin: 2px 0; font-size: 11px; color: #666; }

        /* Menu Deslizante (Tabs) */
        .menu-tabs { display: flex; background: #fff; overflow-x: auto; margin-bottom: 8px; border-radius: 10px; box-shadow: inset 0 0 0 1px #f1f1f1; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: none; font-weight: bold; cursor: pointer; color: #888; border-bottom: 2px solid transparent; white-space: nowrap; font-size: 12px; }
        .tab-btn.active { color: var(--dark-blue); border-bottom: 3px solid var(--dark-blue); }

        main { margin: 0; padding: 0; }
        .section-content { display: none; background: white; padding: 10px; border-radius: 10px; box-shadow: inset 0 0 0 1px #f1f1f1; }
        .section-content.active { display: block; }

        /* Estilização Geral de Tabelas e Forms */
        h2 { font-size: 18px; margin-bottom: 15px; color: var(--dark-blue); }
        .grid-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-update { width: 100%; padding: 12px; background: var(--blue); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Agenda */
        .slot-agenda { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .slot-time { font-weight: bold; font-size: 13px; min-width: 50px; }
        .slot-campo { flex: 1; }
        .btn-disponivel { border: 1px solid #d8d8d8; border-radius: 999px; background: #f4f4f4; color: #666; font-size: 10px; font-weight: bold; padding: 6px 10px; cursor: pointer; min-width: 84px; }
        .btn-disponivel.ativo { background: #e7f8ed; color: #1c7b3a; border-color: #c2ebce; }
        .dica-arrasto { font-size: 10px; color: #666; margin-top: -6px; margin-bottom: 8px; }
        .status-slot { font-size: 10px; color: #777; min-width: 58px; text-align: right; }
        .painel-solicitacoes { margin-top: 12px; background: #fafcff; border: 1px solid #e5eef6; border-radius: 8px; padding: 10px; }
        .painel-solicitacoes h3 { margin: 0 0 8px; font-size: 12px; color: #35516b; }
        .item-solicitacao { border-bottom: 1px solid #e9eef3; padding: 8px 0; }
        .item-solicitacao:last-child { border-bottom: none; }
        .item-solicitacao p { margin: 2px 0; font-size: 11px; color: #4d5c69; }
        .acoes-solicitacao { display: flex; gap: 6px; margin-top: 6px; }
        .btn-solicitacao { flex: 1; border: none; border-radius: 8px; font-size: 10px; font-weight: bold; padding: 7px 8px; cursor: pointer; }
        .btn-aceitar { background: #dff4e6; color: #1f6a36; }
        .btn-recusar { background: #fde8e8; color: #8d2c2c; }
        
        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; background: #f9f9f9; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        @media (max-width: 420px) {
            body { padding: 12px; }
            .login-card { padding: 16px; }
            .grid-row { flex-direction: column; gap: 8px; }
            .slot-agenda { align-items: flex-start; flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>

<div class="page-shell">
    <div class="login-card">
        <header><h1>MY HAIR</h1></header>

        <div class="perfil-resumo">
            <div class="avatar" id="avatarLetra">M</div>
            <div class="info-basica">
                <h3 id="nomeProfissional">Carregando...</h3>
                <p id="idProfissional">ID: MH-0000</p>
            </div>
        </div>

        <nav class="menu-tabs">
            <button class="tab-btn active" onclick="openTab(event, 'agenda')">AGENDA</button>
            <button class="tab-btn" onclick="openTab(event, 'servicos')">SERVIÇOS</button>
            <button class="tab-btn" onclick="openTab(event, 'produtos')">PRODUTOS</button>
        </nav>

        <main>
            <section id="agenda" class="section-content active">
                <h2>Minha Agenda</h2>
                <div class="grid-row">
                    <div class="col"><label>Ano</label><input type="number" id="ano" value="2026"></div>
                    <div class="col">
                        <label>Mês</label>
                        <select id="mes">
                            <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                        </select>
                    </div>
                    <div class="col"><label>Dia</label><input type="number" id="dia" value="13"></div>
                </div>

                <div class="dica-arrasto">Arraste pelos botões DISPONÍVEL para marcar vários horários rapidamente.</div>
                <div id="listaHorarios"></div>

                <div id="painelSolicitacoes" class="painel-solicitacoes" style="display:none;">
                    <h3>Solicitações de agendamento</h3>
                    <div id="listaSolicitacoes"><p style="font-size:11px; color:#666; margin:0;">Nenhuma solicitação pendente.</p></div>
                </div>

                <button class="btn-update" onclick="atualizarAgenda()">ATUALIZAR AGENDA</button>
            </section>

            <section id="servicos" class="section-content">
                <h2>Tabela de Serviços</h2>
                <div class="grid-row">
                    <input type="text" id="serv_nome" placeholder="Serviço (ex: Corte)">
                    <input type="text" id="serv_preco" placeholder="R$ 0,00" style="width: 80px;">
                    <input type="text" id="serv_horas" placeholder="Horas" style="width: 60px;">
                </div>
                <table>
                    <thead><tr><th>Serviço</th><th>Preço</th><th>Tempo</th></tr></thead>
                    <tbody id="corpoServicos"></tbody>
                </table>
                <button class="btn-update" onclick="atualizarServicos()">ATUALIZAR SERVIÇOS</button>
            </section>

            <section id="produtos" class="section-content">
                <h2>Tabela de Produtos</h2>
                <div class="grid-row">
                    <input type="text" id="prod_nome" placeholder="Produto">
                    <input type="number" id="prod_estoque" placeholder="Qtd" style="width: 60px;">
                    <input type="text" id="prod_preco" placeholder="Preço" style="width: 80px;">
                </div>
                <table>
                    <thead><tr><th>Produto</th><th>Estoque</th><th>Preço</th></tr></thead>
                    <tbody id="corpoProdutos"></tbody>
                </table>
                <button class="btn-update" onclick="atualizarProdutos()">ATUALIZAR PRODUTOS</button>
            </section>
        </main>
    </div>
</div>

<script>
    // Inicialização do Firebase (Use as mesmas credenciais do cadastro)
    const firebaseConfig = {
        apiKey: "AIzaSyBU0ctjAg0FUXT-NXjsTqmr5zta5VMKo-0",
        authDomain: "my-hair-v2.firebaseapp.com",
        projectId: "my-hair-v2",
        storageBucket: "my-hair-v2.appspot.com",
        messagingSenderId: "672931938550",
        appId: "1:672931938550:web:fb7ffd0cd9f0fd95236cd7"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const idUsuario = params.get('id') || localStorage.getItem('usuarioID') || "MH-NOVO";
    const tipoPerfilQuery = params.get('tipo');
    let registroAtual = null;
    let referenciaAtual = null;
    let tipoPerfilAtual = 'salao';
    let identificadorAtual = 'anonimo';
    let tipoAtual = 'cliente';
    let favoritosSaida = new Set();
    let favoritosEntrada = new Set();
    let disponibilidadeMarcada = {};
    let arrastoDisponibilidadeAtivo = false;
    let arrastoDisponibilidadeValor = false;

    function atualizarIdentificadorAtual() {
        const usuarioAuth = auth.currentUser;
        identificadorAtual = usuarioAuth?.uid || localStorage.getItem('usuarioID') || 'anonimo';
        return identificadorAtual;
    }

    function getFavoritos() {
        const identificador = atualizarIdentificadorAtual();
        try {
            const salvo = localStorage.getItem(`myhair_favoritos_${identificador}`);
            return new Set(JSON.parse(salvo || '[]'));
        } catch (error) {
            return new Set();
        }
    }

    function salvarFavoritos(favoritos) {
        const identificador = atualizarIdentificadorAtual();
        localStorage.setItem(`myhair_favoritos_${identificador}`, JSON.stringify(Array.from(favoritos)));
    }

    function getIdentificadorPerfil() {
        return registroAtual?.idSistema || registroAtual?.idDoc || idUsuario;
    }

    function comporRelacaoId(deId, paraId) {
        const deSafe = String(deId).replace(/[^a-zA-Z0-9_-]/g, '_');
        const paraSafe = String(paraId).replace(/[^a-zA-Z0-9_-]/g, '_');
        return `fav_${deSafe}__${paraSafe}`;
    }

    function sanitizarId(valor) {
        return String(valor || '').replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function normalizarSlotAgenda(valorSlot) {
        if (!valorSlot) {
            return { disponivel: false, clienteNome: '', clienteId: '', status: '' };
        }

        if (typeof valorSlot === 'string') {
            return { disponivel: false, clienteNome: valorSlot, clienteId: '', status: 'confirmado' };
        }

        return {
            disponivel: Boolean(valorSlot.disponivel),
            clienteNome: String(valorSlot.clienteNome || valorSlot.cliente || ''),
            clienteId: String(valorSlot.clienteId || ''),
            status: String(valorSlot.status || ''),
        };
    }

    function getAgendaDiaAtual() {
        if (!registroAtual || !registroAtual.agenda) {
            return {};
        }
        return registroAtual.agenda[getChaveAgenda()] || {};
    }

    function getDisponibilidadeHora(hora) {
        if (Object.prototype.hasOwnProperty.call(disponibilidadeMarcada, hora)) {
            return Boolean(disponibilidadeMarcada[hora]);
        }
        const slot = normalizarSlotAgenda(getAgendaDiaAtual()[hora]);
        return slot.disponivel && !slot.clienteNome;
    }

    function aplicarDisponibilidadeVisual(hora) {
        const botao = document.getElementById(`disp_${hora.replace(':', '')}`);
        if (!botao) {
            return;
        }
        const ativo = getDisponibilidadeHora(hora);
        botao.classList.toggle('ativo', ativo);
        botao.textContent = ativo ? 'DISPONÍVEL' : 'INDISPONÍVEL';
    }

    function definirDisponibilidadeHora(hora, valor) {
        disponibilidadeMarcada[hora] = Boolean(valor);
        aplicarDisponibilidadeVisual(hora);
    }

    function alternarDisponibilidadeHora(hora) {
        definirDisponibilidadeHora(hora, !getDisponibilidadeHora(hora));
    }

    function iniciarArrastoDisponibilidade(evento, hora) {
        evento.preventDefault();
        arrastoDisponibilidadeAtivo = true;
        arrastoDisponibilidadeValor = !getDisponibilidadeHora(hora);
        definirDisponibilidadeHora(hora, arrastoDisponibilidadeValor);
    }

    function arrastarDisponibilidade(hora) {
        if (!arrastoDisponibilidadeAtivo) {
            return;
        }
        definirDisponibilidadeHora(hora, arrastoDisponibilidadeValor);
    }

    function encerrarArrastoDisponibilidade() {
        arrastoDisponibilidadeAtivo = false;
    }

    function podeGerenciarSolicitacoes() {
        return tipoPerfilAtual === 'salao' && tipoAtual === 'salao' && getIdentificadorPerfil() === identificadorAtual;
    }

    function podeEditarPerfil() {
        return tipoPerfilAtual === 'salao' && tipoAtual === 'salao' && getIdentificadorPerfil() === identificadorAtual;
    }

    function aplicarPermissoesEdicao() {
        const permitido = podeEditarPerfil();

        document.querySelectorAll('#agenda input, #agenda button.btn-disponivel').forEach((el) => {
            el.disabled = !permitido;
        });

        const botaoAgenda = document.querySelector('#agenda .btn-update');
        if (botaoAgenda) {
            botaoAgenda.disabled = !permitido;
        }

        document.querySelectorAll('#servicos input').forEach((el) => {
            el.disabled = !permitido;
        });

        const botaoServicos = document.querySelector('#servicos .btn-update');
        if (botaoServicos) {
            botaoServicos.disabled = !permitido;
        }

        document.querySelectorAll('#produtos input').forEach((el) => {
            el.disabled = !permitido;
        });

        const botaoProdutos = document.querySelector('#produtos .btn-update');
        if (botaoProdutos) {
            botaoProdutos.disabled = !permitido;
        }
    }

    function renderizarSolicitacoesPendentes(solicitacoes) {
        const painel = document.getElementById('painelSolicitacoes');
        const lista = document.getElementById('listaSolicitacoes');
        if (!painel || !lista) {
            return;
        }

        if (!podeGerenciarSolicitacoes()) {
            painel.style.display = 'none';
            return;
        }

        painel.style.display = 'block';

        if (!solicitacoes.length) {
            lista.innerHTML = "<p style='font-size:11px; color:#666; margin:0;'>Nenhuma solicitação pendente.</p>";
            return;
        }

        lista.innerHTML = solicitacoes.map((solicitacao) => `
            <div class="item-solicitacao">
                <p><strong>${solicitacao.clienteNome || 'Cliente'}</strong></p>
                <p>${solicitacao.data} às ${solicitacao.hora}</p>
                <div class="acoes-solicitacao">
                    <button type="button" class="btn-solicitacao btn-aceitar" onclick="responderSolicitacaoAgendamento('${solicitacao.id}', 'aceito')">ACEITAR</button>
                    <button type="button" class="btn-solicitacao btn-recusar" onclick="responderSolicitacaoAgendamento('${solicitacao.id}', 'recusado')">RECUSAR</button>
                </div>
            </div>
        `).join('');
    }

    async function carregarSolicitacoesPendentes() {
        if (!podeGerenciarSolicitacoes()) {
            renderizarSolicitacoesPendentes([]);
            return;
        }

        try {
            const snap = await db.collection('solicitacoes_agendamento')
                .where('prestadorId', '==', getIdentificadorPerfil())
                .where('status', '==', 'pendente')
                .get();

            const solicitacoes = [];
            snap.forEach((doc) => {
                solicitacoes.push({ id: doc.id, ...doc.data() });
            });

            solicitacoes.sort((a, b) => String(a.criadoEm || '').localeCompare(String(b.criadoEm || '')));
            renderizarSolicitacoesPendentes(solicitacoes);
        } catch (error) {
            console.error('Erro ao carregar solicitações:', error);
            renderizarSolicitacoesPendentes([]);
        }
    }

    async function responderSolicitacaoAgendamento(solicitacaoId, resposta) {
        if (!referenciaAtual || !podeGerenciarSolicitacoes()) {
            return;
        }

        try {
            const refSolicitacao = db.collection('solicitacoes_agendamento').doc(solicitacaoId);
            const snap = await refSolicitacao.get();
            if (!snap.exists) {
                return;
            }

            const dados = snap.data();
            const hora = String(dados.hora || '');
            const data = String(dados.data || '');

            if (resposta === 'aceito' && data && hora) {
                const agendaAtual = { ...(registroAtual.agenda || {}) };
                const diaAtual = { ...(agendaAtual[data] || {}) };
                const slotAntigo = normalizarSlotAgenda(diaAtual[hora]);
                diaAtual[hora] = {
                    disponivel: false,
                    clienteNome: dados.clienteNome || slotAntigo.clienteNome || 'Cliente',
                    clienteId: dados.clienteId || slotAntigo.clienteId || '',
                    status: 'confirmado',
                };
                agendaAtual[data] = diaAtual;

                await referenciaAtual.set({ agenda: agendaAtual }, { merge: true });
                registroAtual.agenda = agendaAtual;

                if (data === getChaveAgenda()) {
                    disponibilidadeMarcada[hora] = false;
                    const campo = document.getElementById(`cli_${hora.replace(':', '')}`);
                    if (campo) {
                        campo.value = dados.clienteNome || 'Cliente';
                    }
                    aplicarDisponibilidadeVisual(hora);
                }
            }

            await refSolicitacao.set({
                status: resposta,
                respostaEm: new Date().toISOString(),
                mensagemPrestador: resposta === 'aceito' ? 'horario marcado com sucesso' : 'marcacao recusada pelo prestador',
            }, { merge: true });

            alert(resposta === 'aceito' ? 'Horário marcado com sucesso.' : 'Solicitação recusada.');
            await carregarSolicitacoesPendentes();
        } catch (error) {
            console.error('Erro ao responder solicitação:', error);
            alert('Erro ao responder solicitação de agendamento.');
        }
    }

    window.responderSolicitacaoAgendamento = responderSolicitacaoAgendamento;

    async function resolverPerfilAtual() {
        const usuarioAuth = auth.currentUser;
        if (usuarioAuth?.email) {
            const buscaSalao = await db.collection('usuarios').where('email', '==', usuarioAuth.email).limit(1).get();
            if (!buscaSalao.empty) {
                const doc = buscaSalao.docs[0];
                const dados = doc.data();
                return {
                    id: dados.idSistema || doc.id,
                    tipo: 'salao',
                };
            }

            const buscaCliente = await db.collection('clientes').where('email', '==', usuarioAuth.email).limit(1).get();
            if (!buscaCliente.empty) {
                const doc = buscaCliente.docs[0];
                return {
                    id: doc.id,
                    tipo: 'cliente',
                };
            }
        }

        const idLocal = localStorage.getItem('usuarioID');
        if (idLocal) {
            return {
                id: idLocal,
                tipo: 'salao',
            };
        }

        return {
            id: `anonimo_${identificadorAtual}`,
            tipo: 'cliente',
        };
    }

    async function carregarRelacoesFavorito() {
        favoritosSaida = new Set();
        favoritosEntrada = new Set();

        const saida = await db
            .collection('favoritos')
            .where('deId', '==', identificadorAtual)
            .where('deTipo', '==', tipoAtual)
            .get();

        saida.forEach((doc) => {
            const dados = doc.data();
            favoritosSaida.add(dados.paraId);
        });

        const entrada = await db
            .collection('favoritos')
            .where('paraId', '==', identificadorAtual)
            .where('paraTipo', '==', tipoAtual)
            .get();

        entrada.forEach((doc) => {
            const dados = doc.data();
            favoritosEntrada.add(dados.deId);
        });
    }

    function atualizarBotaoFavorito() {
        const botao = document.getElementById('btnFavoritoPerfil');
        if (!botao) {
            return;
        }
        const favoritos = getFavoritos();
        const identificador = getIdentificadorPerfil();
        const euFavorito = favoritosSaida.has(identificador) || favoritos.has(identificador);
        const favoritouVoce = favoritosEntrada.has(identificador);
        const favorito = euFavorito || favoritouVoce;

        botao.textContent = euFavorito ? 'DESFAVORITAR' : (favoritouVoce ? 'RETRIBUIR' : 'FAVORITAR');
        botao.title = favoritouVoce ? 'Este perfil favoritou você' : '';
        botao.classList.toggle('ativo', favorito);
    }

    async function alternarFavoritoPerfil() {
        if (!registroAtual) {
            return;
        }

        const favoritos = getFavoritos();
        const identificador = getIdentificadorPerfil();
        const tipoAlvo = tipoPerfilAtual === 'cliente' ? 'cliente' : 'salao';
        const usuarioAnonimo = !identificadorAtual || identificadorAtual.startsWith('anonimo_') || identificadorAtual === 'anonimo';

        if (usuarioAnonimo) {
            if (favoritos.has(identificador)) {
                favoritos.delete(identificador);
            } else {
                favoritos.add(identificador);
            }
            salvarFavoritos(favoritos);
            atualizarBotaoFavorito();
            alert('Favorito salvo localmente. Entre com login para sincronizar.');
            return;
        }

        const jaFavorito = favoritosSaida.has(identificador);
        const docId = comporRelacaoId(`${tipoAtual}_${identificadorAtual}`, `${tipoAlvo}_${identificador}`);
        const ref = db.collection('favoritos').doc(docId);

        try {
            if (jaFavorito) {
                await ref.delete();
                favoritosSaida.delete(identificador);
                favoritos.delete(identificador);
            } else {
                await ref.set({
                    deId: identificadorAtual,
                    deTipo: tipoAtual,
                    paraId: identificador,
                    paraTipo: tipoAlvo,
                    criadoEm: new Date().toISOString(),
                });
                favoritosSaida.add(identificador);
                favoritos.add(identificador);
            }

            salvarFavoritos(favoritos);
            await carregarRelacoesFavorito();
            atualizarBotaoFavorito();
        } catch (error) {
            console.error('Erro ao atualizar favorito no Firestore:', error);
            alert('Erro ao atualizar favorito.');
        }
    }

    // Lógica das Abas
    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("section-content");
        for (let i = 0; i < contents.length; i++) contents[i].className = contents[i].className.replace(" active", "");
        let btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < btns.length; i++) btns[i].className = btns[i].className.replace(" active", "");
        document.getElementById(tabName).className += " active";
        evt.currentTarget.className += " active";
    }

    // Gerar Horários de 30 em 30 min (08h às 19h)
    function carregarSlotsAgenda() {
        const lista = document.getElementById('listaHorarios');
        disponibilidadeMarcada = {};
        lista.innerHTML = "";
        for(let h = 8; h <= 19; h++) {
            for(let m of ['00', '30']) {
                const hora = `${h.toString().padStart(2, '0')}:${m}`;
                lista.innerHTML += `
                    <div class="slot-agenda">
                        <span class="slot-time">${hora}</span>
                        <button type="button" class="btn-disponivel" id="disp_${hora.replace(':','')}" onmousedown="iniciarArrastoDisponibilidade(event, '${hora}')" onmouseenter="arrastarDisponibilidade('${hora}')">INDISPONÍVEL</button>
                        <input type="text" class="slot-campo" placeholder="Nome do Cliente" id="cli_${hora.replace(':','')}">
                        <span class="status-slot" id="status_${hora.replace(':','')}">Livre</span>
                    </div>`;
            }
        }

        preencherAgendaAtual();
    }

    function getChaveAgenda() {
        const ano = document.getElementById('ano').value;
        const mes = String(document.getElementById('mes').value).padStart(2, '0');
        const dia = String(document.getElementById('dia').value).padStart(2, '0');
        return `${ano}-${mes}-${dia}`;
    }

    function preencherAgendaAtual() {
        const agendaDia = getAgendaDiaAtual();
        for(let h = 8; h <= 19; h++) {
            for(let m of ['00', '30']) {
                const hora = `${h.toString().padStart(2, '0')}:${m}`;
                const slot = normalizarSlotAgenda(agendaDia[hora]);
                const campo = document.getElementById(`cli_${hora.replace(':', '')}`);
                const status = document.getElementById(`status_${hora.replace(':', '')}`);

                if (campo) {
                    campo.value = slot.clienteNome || '';
                }

                disponibilidadeMarcada[hora] = slot.disponivel && !slot.clienteNome;
                aplicarDisponibilidadeVisual(hora);

                if (status) {
                    status.textContent = slot.clienteNome ? 'Ocupado' : (disponibilidadeMarcada[hora] ? 'Livre' : 'Fechado');
                }
            }
        }
    }

    function renderizarServicos() {
        const corpo = document.getElementById('corpoServicos');
        corpo.innerHTML = '';

        const servicos = Array.isArray(registroAtual?.tabelaServicos) && registroAtual.tabelaServicos.length
            ? registroAtual.tabelaServicos
            : (Array.isArray(registroAtual?.servicosOferecidos)
                ? registroAtual.servicosOferecidos.map((servico) => ({ nome: servico, preco: '-', tempo: '-' }))
                : []);
        servicos.forEach((servico) => {
            corpo.innerHTML += `<tr><td>${servico.nome}</td><td>R$ ${servico.preco}</td><td>${servico.tempo}</td></tr>`;
        });
    }

    function renderizarProdutos() {
        const corpo = document.getElementById('corpoProdutos');
        corpo.innerHTML = '';

        const produtos = Array.isArray(registroAtual?.tabelaProdutos) && registroAtual.tabelaProdutos.length
            ? registroAtual.tabelaProdutos
            : (Array.isArray(registroAtual?.produtosVenda)
                ? registroAtual.produtosVenda.map((produto) => ({ nome: produto, estoque: '-', preco: '-' }))
                : []);
        produtos.forEach((produto) => {
            corpo.innerHTML += `<tr><td>${produto.nome}</td><td>${produto.estoque}</td><td>R$ ${produto.preco}</td></tr>`;
        });
    }

    async function atualizarAgenda() {
        if (!podeEditarPerfil()) {
            alert('Somente o dono do cadastro pode alterar a agenda.');
            return;
        }

        if (!referenciaAtual) {
            alert('Perfil ainda nao carregado.');
            return;
        }

        const agendaDia = {};
        for(let h = 8; h <= 19; h++) {
            for(let m of ['00', '30']) {
                const hora = `${h.toString().padStart(2, '0')}:${m}`;
                const campo = document.getElementById(`cli_${hora.replace(':','')}`);
                const clienteNome = campo ? campo.value.trim() : '';
                const disponivel = getDisponibilidadeHora(hora);
                const slotAntigo = normalizarSlotAgenda(getAgendaDiaAtual()[hora]);

                if (clienteNome) {
                    agendaDia[hora] = {
                        disponivel: false,
                        clienteNome,
                        clienteId: slotAntigo.clienteId || '',
                        status: 'confirmado',
                    };
                    continue;
                }

                if (disponivel) {
                    agendaDia[hora] = {
                        disponivel: true,
                        clienteNome: '',
                        clienteId: '',
                        status: 'disponivel',
                    };
                }
            }
        }

        const agenda = {
            ...(registroAtual.agenda || {}),
            [getChaveAgenda()]: agendaDia,
        };

        try {
            await referenciaAtual.set({ agenda }, { merge: true });
            registroAtual.agenda = agenda;
            alert('Agenda atualizada para o dia selecionado!');
            preencherAgendaAtual();
        } catch (error) {
            console.error('Erro ao salvar agenda:', error);
            alert('Erro ao salvar agenda.');
        }
    }

    async function atualizarServicos() {
        if (!podeEditarPerfil()) {
            alert('Somente o dono do cadastro pode incluir ou alterar serviços.');
            return;
        }

        if (!referenciaAtual) {
            alert('Perfil ainda nao carregado.');
            return;
        }

        const nome = document.getElementById('serv_nome').value;
        const preco = document.getElementById('serv_preco').value;
        const horas = document.getElementById('serv_horas').value;
        if (!nome) {
            return;
        }

        const tabelaServicos = [
            ...(Array.isArray(registroAtual.tabelaServicos) ? registroAtual.tabelaServicos : []),
            {
                nome: nome.trim(),
                preco: preco.trim(),
                tempo: horas.trim(),
            },
        ];

        try {
            await referenciaAtual.set({ tabelaServicos }, { merge: true });
            registroAtual.tabelaServicos = tabelaServicos;
            renderizarServicos();
            document.getElementById('serv_nome').value = "";
            document.getElementById('serv_preco').value = "";
            document.getElementById('serv_horas').value = "";
        } catch (error) {
            console.error('Erro ao salvar servicos:', error);
            alert('Erro ao salvar servicos.');
        }
    }

    async function atualizarProdutos() {
        if (!podeEditarPerfil()) {
            alert('Somente o dono do cadastro pode incluir ou alterar produtos.');
            return;
        }

        if (!referenciaAtual) {
            alert('Perfil ainda nao carregado.');
            return;
        }

        const nome = document.getElementById('prod_nome').value;
        const qtd = document.getElementById('prod_estoque').value;
        const preco = document.getElementById('prod_preco').value;
        if (!nome) {
            return;
        }

        const tabelaProdutos = [
            ...(Array.isArray(registroAtual.tabelaProdutos) ? registroAtual.tabelaProdutos : []),
            {
                nome: nome.trim(),
                estoque: qtd.trim(),
                preco: preco.trim(),
            },
        ];

        try {
            await referenciaAtual.set({ tabelaProdutos }, { merge: true });
            registroAtual.tabelaProdutos = tabelaProdutos;
            renderizarProdutos();
            document.getElementById('prod_nome').value = "";
            document.getElementById('prod_estoque').value = "";
            document.getElementById('prod_preco').value = "";
        } catch (error) {
            console.error('Erro ao salvar produtos:', error);
            alert('Erro ao salvar produtos.');
        }
    }

    async function carregarPerfil() {
        document.getElementById('idProfissional').innerText = "ID: " + idUsuario;

        try {
            const perfilAtual = await resolverPerfilAtual();
            identificadorAtual = perfilAtual.id;
            tipoAtual = perfilAtual.tipo;
            await carregarRelacoesFavorito();

            let registro = null;

            async function buscarSalao() {
                const docDireto = await db.collection('usuarios').doc(idUsuario).get();
                if (docDireto.exists) {
                    return {
                        registro: { idDoc: docDireto.id, entityType: 'salao', ...docDireto.data() },
                        referencia: docDireto.ref,
                        tipoPerfil: 'salao',
                    };
                }

                const busca = await db.collection('usuarios').where('idSistema', '==', idUsuario).limit(1).get();
                if (!busca.empty) {
                    const doc = busca.docs[0];
                    return {
                        registro: { idDoc: doc.id, entityType: 'salao', ...doc.data() },
                        referencia: doc.ref,
                        tipoPerfil: 'salao',
                    };
                }

                return null;
            }

            async function buscarCliente() {
                const docDireto = await db.collection('clientes').doc(idUsuario).get();
                if (docDireto.exists) {
                    return {
                        registro: { idDoc: docDireto.id, entityType: 'cliente', ...docDireto.data() },
                        referencia: docDireto.ref,
                        tipoPerfil: 'cliente',
                    };
                }

                return null;
            }

            const ordemBusca = tipoPerfilQuery === 'cliente'
                ? [buscarCliente, buscarSalao]
                : [buscarSalao, buscarCliente];

            for (const buscar of ordemBusca) {
                const resultado = await buscar();
                if (resultado) {
                    registro = resultado.registro;
                    referenciaAtual = resultado.referencia;
                    tipoPerfilAtual = resultado.tipoPerfil;
                    break;
                }
            }

            if (!registro) {
                document.getElementById('nomeProfissional').innerText = 'Perfil não encontrado';
                return;
            }

            registroAtual = registro;
            const nomeExibicao = registro.fantasia || registro.nome || 'Profissional';
            document.getElementById('nomeProfissional').innerText = nomeExibicao;
            document.getElementById('avatarLetra').innerText = nomeExibicao.charAt(0).toUpperCase();
            document.getElementById('idProfissional').innerText = 'ID: ' + (registro.idSistema || registro.idDoc || idUsuario);
            renderizarServicos();
            renderizarProdutos();
            preencherAgendaAtual();
            atualizarBotaoFavorito();
            aplicarPermissoesEdicao();
            await carregarSolicitacoesPendentes();
        } catch (error) {
            console.error('Erro ao carregar perfil:', error);
        }
    }

    // Ao carregar a página
    window.onload = () => {
        carregarSlotsAgenda();
        window.addEventListener('mouseup', encerrarArrastoDisponibilidade);
        window.addEventListener('touchend', encerrarArrastoDisponibilidade);
        document.getElementById('ano').addEventListener('change', carregarSlotsAgenda);
        document.getElementById('mes').addEventListener('change', carregarSlotsAgenda);
        document.getElementById('dia').addEventListener('change', carregarSlotsAgenda);
        const btnFavoritoPerfil = document.getElementById('btnFavoritoPerfil');
        if (btnFavoritoPerfil) {
            btnFavoritoPerfil.addEventListener('click', alternarFavoritoPerfil);
        }
        carregarPerfil();
    };

    auth.onAuthStateChanged(() => {
        atualizarIdentificadorAtual();
    });
</script>
