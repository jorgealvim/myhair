<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Recuperar Senha</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fce4ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #333; font-size: 18px; margin-bottom: 10px; }
        p { color: #666; font-size: 13px; margin-bottom: 20px; }
        
        .metodo-selecao { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; }
        .option-card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .option-card:hover { border-color: #b3e5fc; background: #f1faff; }
        .option-card input { width: auto; margin: 0; }
        .option-card label { cursor: pointer; font-size: 13px; font-weight: bold; flex-grow: 1; }

        input[type="text"], input[type="email"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; display: none; }
        
        .btn-enviar { width: 100%; padding: 15px; background-color: #b3e5fc; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link-voltar { display: block; margin-top: 15px; font-size: 12px; color: #0288d1; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Recuperar Senha</h2>
    <p>Escolha como deseja receber o link de redefinição:</p>
    
    <div class="metodo-selecao">
        <div class="option-card" onclick="selecionar('email')">
            <input type="radio" name="metodo" id="m_email" value="email" checked>
            <label for="m_email">📧 E-mail</label>
        </div>
        <div class="option-card" onclick="selecionar('whats')">
            <input type="radio" name="metodo" id="m_whats" value="whats">
            <label for="m_whats">🟢 WhatsApp</label>
        </div>
        <div class="option-card" onclick="selecionar('sms')">
            <input type="radio" name="metodo" id="m_sms" value="sms">
            <label for="m_sms">📱 SMS</label>
        </div>
    </div>

    <input type="email" id="campoEmail" placeholder="Digite seu e-mail" style="display: block;">
    <input type="text" id="campoTelefone" placeholder="Ex: 5511999999999">

    <button class="btn-enviar" onclick="processarRecuperacao()">ENVIAR LINK</button>
    
    <a href="index.html" class="link-voltar">Voltar para o login</a>
</div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyBU0ctjAg0FUXT-NXjsTqmr5zta5VMKo-0",
  authDomain: "my-hair-v2.firebaseapp.com",
  projectId: "my-hair-v2",
  storageBucket: "my-hair-v2.appspot.com",
  messagingSenderId: "672931938550",
  appId: "1:672931938550:web:fb7ffd0cd9f0fd95236cd7"
    };
    firebase.initializeApp(firebaseConfig);

    function selecionar(tipo) {
        document.getElementById('m_' + tipo).checked = true;
        const cEmail = document.getElementById('campoEmail');
        const cTel = document.getElementById('campoTelefone');

        if (tipo === 'email') {
            cEmail.style.display = 'block';
            cTel.style.display = 'none';
        } else {
            cEmail.style.display = 'none';
            cTel.style.display = 'block';
        }
    }

    function processarRecuperacao() {
        const metodo = document.querySelector('input[name="metodo"]:checked').value;
        const email = document.getElementById('campoEmail').value;
        const telefone = document.getElementById('campoTelefone').value.replace(/\D/g, '');

        if (metodo === 'email') {
            if (!email) return alert("Digite o e-mail");
            firebase.auth().sendPasswordResetEmail(email)
                .then(() => alert("Link enviado para o seu e-mail!"))
                .catch(err => alert("Erro: " + err.message));
        } 
        
        else if (metodo === 'whats') {
            if (telefone.length < 10) return alert("Digite o telefone com DDD");
            const mensagem = encodeURIComponent(`Olá, esqueci minha senha no MY HAIR. Poderia me enviar o link de redefinição para o e-mail cadastrado? Minha conta é: ${telefone}`);
            window.open(`https://wa.me/${telefone}?text=${mensagem}`, '_blank');
        }

        else if (metodo === 'sms') {
            if (telefone.length < 10) return alert("Digite o telefone com DDD");
            // Abre o app de SMS do celular com destinatário e mensagem pré-definida
            const msgSMS = "Solicito redefinicao de senha My Hair";
            window.location.href = `sms:${telefone}?body=${encodeURIComponent(msgSMS)}`;
        }
    }
</script>

</body>
</html>
