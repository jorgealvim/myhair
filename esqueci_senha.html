<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Recuperar Senha</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg-rose: #fce4ec;
            --bg-cream: #fff8f1;
            --card: rgba(255, 255, 255, 0.92);
            --line: #dce6ef;
            --primary: #0f7db8;
            --primary-soft: #bfe8fb;
            --text-soft: #5f6b76;
            --shadow-lg: 0 22px 50px rgba(100, 60, 80, 0.16);
            --shadow-md: 0 10px 24px rgba(33, 58, 80, 0.1);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), transparent 32%),
                radial-gradient(circle at bottom right, rgba(179, 229, 252, 0.45), transparent 26%),
                linear-gradient(145deg, var(--bg-cream) 0%, var(--bg-rose) 52%, #f7dfe8 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 20px 36px;
            position: relative;
            overflow-x: hidden;
        }
        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.24);
            filter: blur(10px);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: -40px;
            right: -60px;
        }
        body::after {
            bottom: -70px;
            left: -70px;
            background: rgba(179, 229, 252, 0.24);
        }
        .login-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 18px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.7);
            width: 100%;
            max-width: 360px;
            text-align: center;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        h2 { color: #13212c; margin-bottom: 5px; font-size: 26px; letter-spacing: -1.2px; }
        .subtitle { color: var(--text-soft); font-size: 12px; margin-bottom: 18px; letter-spacing: 0.2px; }
        p { color: var(--text-soft); font-size: 13px; margin-bottom: 12px; }
        .metodo-selecao { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; }
        .option-card { border: 1px solid #d7e0e8; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; background: rgba(255,255,255,0.95); }
        .option-card:hover { border-color: #b3e5fc; background: #f1faff; }
        .option-card input { width: auto; margin: 0; }
        .option-card label { cursor: pointer; font-size: 14px; font-weight: bold; flex-grow: 1; }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 11px 12px;
            margin-bottom: 10px;
            border: 1px solid #d7e0e8;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.95);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            display: none;
        }
        input[type="email"]:not([style*="display: none"]) {
            display: block;
        }
        input[type="text"]:not([style*="display: none"]) {
            display: block;
        }
        input:focus {
            outline: none;
            border-color: #82c9ea;
            box-shadow: 0 0 0 4px rgba(179, 229, 252, 0.34);
            transform: translateY(-1px);
        }
        .btn-enviar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9fdff9, #77c9ef);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            margin-top: 8px;
            color: #073754;
            box-shadow: var(--shadow-md);
        }
        .btn-enviar:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
        }
        .link-voltar { display: block; margin-top: 8px; font-size: 12px; color: #0288d1; text-decoration: none; font-weight: bold; }
        .link-voltar:hover { text-decoration: underline; }
        @media (max-width: 760px) {
            body {
                padding: 18px 14px 26px;
            }
            .login-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Recuperar Senha</h2>
    <div class="subtitle">Redefina sua senha de acesso ao My Hair</div>
    <p>Escolha como deseja receber o link de redefinição:</p>
    <div class="metodo-selecao">
        <div class="option-card" onclick="selecionar('email')">
            <input type="radio" name="metodo" id="m_email" value="email" checked>
            <label for="m_email">📧 E-mail</label>
        </div>
        <div class="option-card" onclick="selecionar('whats')">
            <input type="radio" name="metodo" id="m_whats" value="whats">
            <label for="m_whats">🟢 WhatsApp</label>
        </div>
        <div class="option-card" onclick="selecionar('sms')">
            <input type="radio" name="metodo" id="m_sms" value="sms">
            <label for="m_sms">📱 SMS</label>
        </div>
    </div>
    <input type="email" id="campoEmail" placeholder="Digite seu e-mail" style="display: block;">
    <input type="text" id="campoTelefone" placeholder="Ex: 5511999999999">
    <button class="btn-enviar" onclick="processarRecuperacao()">ENVIAR LINK</button>
    <a href="index.html" class="link-voltar">Voltar para o login</a>
</div>

<script>
        const firebaseConfig = {
            apiKey: "AIzaSyBU0ctjAg0FUXT-NXjsTqmr5zta5VMKo-0",
            authDomain: "my-hair-v2.firebaseapp.com",
            projectId: "my-hair-v2",
            storageBucket: "my-hair-v2.appspot.com",
            messagingSenderId: "672931938550",
            appId: "1:672931938550:web:fb7ffd0cd9f0fd95236cd7"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

    function selecionar(tipo) {
        document.getElementById('m_' + tipo).checked = true;
        const cEmail = document.getElementById('campoEmail');
        const cTel = document.getElementById('campoTelefone');

        if (tipo === 'email') {
            cEmail.style.display = 'block';
            cTel.style.display = 'none';
        } else {
            cEmail.style.display = 'none';
            cTel.style.display = 'block';
        }
    }

    function processarRecuperacao() {
        const metodo = document.querySelector('input[name="metodo"]:checked').value;
        const email = document.getElementById('campoEmail').value;
        const telefone = document.getElementById('campoTelefone').value.replace(/\D/g, '');

        if (metodo === 'email') {
            if (!email) return alert("Digite o e-mail");
            firebase.auth().sendPasswordResetEmail(email)
                .then(() => alert("Link enviado para o seu e-mail!"))
                .catch(err => {
                    const codigo = err && err.code ? err.code : 'erro-desconhecido';
                    alert("Erro ao enviar link: " + codigo + " - " + err.message);
                });
        } 
        
        else if (metodo === 'whats') {
            if (telefone.length < 10) return alert("Digite o telefone com DDD");
            const mensagem = encodeURIComponent(`Olá, esqueci minha senha no MY HAIR. Poderia me enviar o link de redefinição para o e-mail cadastrado? Minha conta é: ${telefone}`);
            window.open(`https://wa.me/${telefone}?text=${mensagem}`, '_blank');
        }

        else if (metodo === 'sms') {
            if (telefone.length < 10) return alert("Digite o telefone com DDD");
            // Abre o app de SMS do celular com destinatário e mensagem pré-definida
            const msgSMS = "Solicito redefinicao de senha My Hair";
            window.location.href = `sms:${telefone}?body=${encodeURIComponent(msgSMS)}`;
        }
    }
</script>

</body>
</html>
