<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Cadastro Geral</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="scripts/myhair_core.js"></script>
    <script src="scripts/app_permissoes.js"></script>
    <style>
        :root { --pink: #fce4ec; --blue: #b3e5fc; --cream: #fffaf6; --ink: #223142; --soft-ink: #667587; --line: #dbe7f1; --shadow-lg: 0 24px 48px rgba(62, 85, 110, 0.14); --shadow-md: 0 12px 24px rgba(62, 85, 110, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 28%), radial-gradient(circle at bottom right, rgba(179,229,252,0.35), transparent 24%), linear-gradient(160deg, var(--cream) 0%, var(--pink) 100%); margin: 0; color: var(--ink); min-height: 100vh; padding: 20px; }
        header { background-color: rgba(255,255,255,0.94); backdrop-filter: blur(10px); padding: 18px 16px; text-align: center; box-shadow: var(--shadow-lg); border-radius: 18px; margin-bottom: 14px; max-width: 360px; margin-left: auto; margin-right: auto; border: 1px solid rgba(255,255,255,0.75); }
        header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        header p { margin: 4px 0 0; font-size: 12px; color: var(--soft-ink); }
        main { padding: 0; max-width: 360px; margin: 0 auto; }
        .form-card { background: rgba(255,255,255,0.94); backdrop-filter: blur(10px); padding: 16px; border-radius: 18px; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.75); }
        h2 { font-size: 13px; border-bottom: 2px solid #b3e5fc; padding-bottom: 6px; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
        label { display: block; margin-top: 8px; font-weight: bold; font-size: 11px; }
        input, select, textarea { width: 100%; padding: 10px 11px; margin-top: 4px; border: 1px solid #d7e2eb; border-radius: 10px; box-sizing: border-box; font-size: 13px; background: rgba(255,255,255,0.96); transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease; }
        textarea { resize: vertical; min-height: 70px; }
        
        /* Estilo para Grades de Ícones/Checkboxes */
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .icon-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border: 1px solid #e8eef4; border-radius: 12px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background-color 0.2s ease; text-align: center; background: linear-gradient(180deg, #ffffff, #fbfdff); }
        .icon-item input { display: none; }
        .icon-item span { font-size: 24px; margin-bottom: 5px; }
        .icon-item p { margin: 0; font-size: 11px; font-weight: bold; }
        
        /* Efeito de Seleção */
        .icon-item:has(input:checked) { background-color: #e3f2fd; border-color: #2196f3; color: #1565c0; box-shadow: 0 10px 20px rgba(33, 150, 243, 0.16); }

        .check-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: normal; cursor: pointer; }
        .check-item input { width: auto; margin: 0; padding: 0; cursor: pointer; }

        .id-caixa { background: linear-gradient(180deg, #eef8ff, #e3f2fd); padding: 12px; border-radius: 10px; border: 1px dashed #2196f3; font-weight: bold; text-align: center; margin-bottom: 20px; color: #1565c0; box-shadow: var(--shadow-md); }
        .row { display: flex; gap: 10px; }
        .half { flex: 1; }
        .third { flex: 0.3; }
        .hidden { display: none; }
        
        .btn-voltar { background: #f3f3f3; border: none; padding: 9px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; margin-bottom: 12px; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
        .btn-save { width: 100%; padding: 12px; background: linear-gradient(135deg, #9fdff9, #7ecceb); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 14px; color: #043a5a; box-shadow: 0 8px 18px rgba(18, 89, 132, 0.14); transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { flex: 1; padding: 12px; background: #fff; border: 1px solid #b3e5fc; border-radius: 10px; cursor: pointer; font-weight: bold; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-delete { flex: 1; padding: 12px; background: #fff; border: 1px solid #ffcdd2; border-radius: 10px; cursor: pointer; font-weight: bold; color: #d32f2f; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .loading { font-size: 11px; color: #0288d1; display: none; }
        .status-acesso { margin-top: 12px; padding: 10px; border-radius: 12px; background: #f5f7fa; color: #4d5c69; font-size: 11px; font-weight: bold; text-align: center; box-shadow: var(--shadow-md); }
        .status-acesso.owner { background: #e7f8ed; color: #1c7b3a; }
        .status-acesso.viewer { background: #fdeaea; color: #a13434; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #92cbe8; box-shadow: 0 0 0 4px rgba(179,229,252,0.36); transform: translateY(-1px); }
        .icon-item:hover, .btn-voltar:hover, .btn-save:hover, .btn-edit:hover, .btn-delete:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(62, 85, 110, 0.12); }

        @media (max-width: 420px) {
            body { padding: 12px; }
            header, .form-card { border-radius: 16px; }
            .row, .btn-row { flex-direction: column; }
            main { max-width: 100%; }
        }
    </style>
</head>
<body>

<header><h1>MY HAIR</h1><p>Cadastro Unificado</p></header>

<main>
    <div class="form-card">
        <button type="button" class="btn-voltar" onclick="history.back()">← VOLTAR</button>

        <label>ID DO SISTEMA</label>
        <div id="displayID" class="id-caixa">GERANDO...</div>

        <form id="formGeral">
            <h2>Tipo de Atuação</h2>
            <select id="tipoConta" onchange="mudarTipo()">
                <option value="PF">Pessoa Física (Autônomo)</option>
                <option value="PJ">Pessoa Jurídica (Salão/Empresa)</option>
            </select>

            <h2>Serviços Oferecidos</h2>
            <div class="icon-grid">
                <label class="icon-item"><span>💇‍♂️</span><p>Cabelo</p><input type="checkbox" name="servicos" value="cabelo"></label>
                <label class="icon-item"><span>👣</span><p>Pé</p><input type="checkbox" name="servicos" value="pe"></label>
                <label class="icon-item"><span>💅</span><p>Mão</p><input type="checkbox" name="servicos" value="mao"></label>
                <label class="icon-item"><span>👁️</span><p>Sobrancelha</p><input type="checkbox" name="servicos" value="sobrancelha"></label>
                <label class="icon-item"><span>💄</span><p>Maquiagem</p><input type="checkbox" name="servicos" value="maquiagem"></label>
                <label class="icon-item"><span>💆‍♀️</span><p>Massagem</p><input type="checkbox" name="servicos" value="massagem"></label>
                <label class="icon-item"><span>🧔</span><p>Barba</p><input type="checkbox" name="servicos" value="barba"></label>
                <label class="icon-item"><span>🍯</span><p>Depilação</p><input type="checkbox" name="servicos" value="depilacao"></label>
            </div>

            <h2>Produtos para Venda</h2>
            <div class="icon-grid">
                <label class="icon-item"><span>🧴</span><p>Cremes</p><input type="checkbox" name="produtos" value="cremes"></label>
                <label class="icon-item"><span>🧼</span><p>Shampoos</p><input type="checkbox" name="produtos" value="shampoos"></label>
                <label class="icon-item"><span>✂️</span><p>Acessórios</p><input type="checkbox" name="produtos" value="acessorios"></label>
                <label class="icon-item"><span>🧪</span><p>Tinturas</p><input type="checkbox" name="produtos" value="tinturas"></label>
            </div>

            <h2>Local de Prestação de Serviços</h2>
            <div class="check-group">
                <label class="check-item"><input type="checkbox" name="localServico" value="empresa"> Na Empresa</label>
                <label class="check-item"><input type="checkbox" name="localServico" value="domicilio"> A Domicílio</label>
            </div>

            <h2>Dados de Identificação</h2>
            <label id="labelDoc">CPF</label>
            <input type="text" id="documento" placeholder="000.000.000-00" onblur="consultarCNPJ()">
            <span id="loadCnpj" class="loading">Consultando Receita Federal...</span>
            
            <label id="labelNome">Nome Completo</label>
            <input type="text" id="nome">

            <div id="areaPJ" class="hidden">
                <label>Nome Fantasia</label>
                <input type="text" id="fantasia">
            </div>

            <div class="row">
                <div class="half"><label>WhatsApp</label><input type="text" id="whats"></div>
                <div class="half"><label>E-mail</label><input type="email" id="email"></div>
            </div>

            <label>Boas-vindas (Cartão de Visitas)</label>
            <textarea id="boasVindas" placeholder="Ex: Seja bem-vindo ao nosso salão! Será um prazer cuidar de você."></textarea>

            <div class="row">
                <div class="half"><label>Criar Senha</label><input type="password" id="senha"></div>
                <div class="half"><label>Confirmar Senha</label><input type="password" id="confirmarSenha"></div>
            </div>

            <h2>Endereço Completo</h2>
            <label>CEP</label>
            <input type="text" id="cep" placeholder="00000-000" onblur="buscarCEP(this.value)">
            
            <label>Rua/Logradouro</label>
            <input type="text" id="rua">

            <div class="row">
                <div class="third"><label>Nº</label><input type="text" id="numero" placeholder="123"></div>
                <div class="half"><label>Complemento</label><input type="text" id="complemento" placeholder="Apto, Bloco, etc."></div>
            </div>

            <div class="row">
                <div class="half"><label>Bairro</label><input type="text" id="bairro"></div>
                <div class="half"><label>Cidade/UF</label><input type="text" id="cidade"></div>
            </div>

            <h2>Forma de Retirada dos Produtos</h2>
            <div class="check-group">
                <label class="check-item"><input type="checkbox" name="retiradaProduto" value="empresa"> Na Empresa</label>
                <label class="check-item"><input type="checkbox" name="retiradaProduto" value="entrega"> Entrega</label>
                <label class="check-item"><input type="checkbox" name="retiradaProduto" value="transportadora"> Despacho por Transportadora</label>
            </div>

            <h2>Dados Bancários (Repasse 85%)</h2>
            <label>Banco</label>
            <select id="banco">
                <option value="">Selecione o Banco</option>
                <option value="Nubank">260 - Nubank</option>
                <option value="BB">001 - Banco do Brasil</option>
                <option value="Itau">341 - Itaú</option>
                <option value="Bradesco">237 - Bradesco</option>
                <option value="Inter">077 - Inter</option>
            </select>
            <div class="row">
                <div class="half"><label>Agência</label><input type="text" id="ag"></div>
                <div class="half"><label>Conta com Dígito</label><input type="text" id="cc"></div>
            </div>

            <button type="button" class="btn-save" onclick="salvarCadastro()">SALVAR E IR PARA PREÇOS</button>
            
            <div class="btn-row">
                <button type="button" class="btn-edit" onclick="habilitarEdicao()">EDITAR DADOS</button>
                <button type="button" class="btn-delete" onclick="excluirCadastro()">EXCLUIR CONTA</button>
            </div>

            <div id="statusAcessoCadastro" class="status-acesso">Verificando permissões...</div>
        </form>
    </div>
</main>

<script>
    const { flagDevAtiva } = window.MyHairCore;

    window.MyHairCore.ensureFirebaseApp();
    const auth = firebase.auth();
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);

    const modoDesenvolvedorAtivo = flagDevAtiva(params.get('dev'))
        || flagDevAtiva(params.get('modo'))
        || flagDevAtiva(localStorage.getItem('myhair_modo_dev'));
    let idDocFirebase = null;
    let cadastroCarregado = null;
    let edicaoLiberada = false;
    let carregamentoCadastroEmAndamento = false;

    const idGerado = localStorage.getItem('usuarioID') || "MH-NOVO";
    document.getElementById('displayID').innerText = idGerado;

    function estaEmModoDesenvolvedor() {
        return modoDesenvolvedorAtivo;
    }

    function obterEmailAutenticado() {
        return (auth.currentUser?.email || '').trim().toLowerCase();
    }

    function podeGerenciarCadastro() {
        if (estaEmModoDesenvolvedor()) {
            return true;
        }

        if (!cadastroCarregado) {
            return true;
        }

        const emailAuth = obterEmailAutenticado();
        const emailCadastro = String(cadastroCarregado.email || '').trim().toLowerCase();
        return Boolean(emailAuth && emailCadastro && emailAuth === emailCadastro);
    }

    function atualizarStatusAcessoCadastro() {
        const status = document.getElementById('statusAcessoCadastro');
        if (!status) {
            return;
        }

        if (estaEmModoDesenvolvedor()) {
            status.className = 'status-acesso owner';
            status.textContent = 'MODO DESENVOLVEDOR: edição e exclusão liberadas para manutenção.';
            return;
        }

        if (!cadastroCarregado) {
            status.className = 'status-acesso owner';
            status.textContent = 'Novo cadastro: você pode preencher e salvar seus próprios dados.';
            return;
        }

        if (podeGerenciarCadastro()) {
            status.className = 'status-acesso owner';
            status.textContent = 'Dono do cadastro: edição e exclusão liberadas.';
            return;
        }

        status.className = 'status-acesso viewer';
        status.textContent = 'Somente o dono do perfil pode alterar ou excluir estes dados.';
    }

    function aplicarPermissoesCadastro() {
        const permitido = edicaoLiberada && podeGerenciarCadastro();
        const form = document.getElementById('formGeral');
        if (!form) {
            return;
        }

        form.querySelectorAll('input, select, textarea').forEach((campo) => {
            if (campo.id === 'senha' || campo.id === 'confirmarSenha') {
                campo.disabled = !permitido && Boolean(cadastroCarregado);
                return;
            }
            campo.disabled = !permitido;
        });

        const btnSalvar = document.querySelector('.btn-save');
        const btnEditar = document.querySelector('.btn-edit');
        const btnExcluir = document.querySelector('.btn-delete');
        if (btnSalvar) {
            btnSalvar.disabled = !permitido;
        }
        if (btnEditar) {
            btnEditar.disabled = !podeGerenciarCadastro();
        }
        if (btnExcluir) {
            btnExcluir.disabled = !podeGerenciarCadastro() || !idDocFirebase;
        }

        atualizarStatusAcessoCadastro();
    }

    function preencherCheckboxes(nome, valores) {
        const lista = Array.isArray(valores) ? valores : [];
        document.querySelectorAll(`input[name="${nome}"]`).forEach((item) => {
            item.checked = lista.includes(item.value);
        });
    }

    function preencherFormulario(dados) {
        document.getElementById('tipoConta').value = dados.tipoConta || 'PF';
        mudarTipo();
        document.getElementById('documento').value = dados.documento || '';
        document.getElementById('nome').value = dados.nome || '';
        document.getElementById('fantasia').value = dados.fantasia || '';
        document.getElementById('whats').value = dados.whatsapp || dados.whats || '';
        document.getElementById('email').value = dados.email || '';
        document.getElementById('boasVindas').value = dados.boasVindas || '';
        document.getElementById('cep').value = dados.cep || '';
        document.getElementById('rua').value = dados.endereco || dados.rua || '';
        document.getElementById('numero').value = dados.numero || '';
        document.getElementById('complemento').value = dados.complemento || '';
        document.getElementById('bairro').value = dados.bairro || '';
        document.getElementById('cidade').value = [dados.cidade || '', dados.uf || ''].filter(Boolean).join('/');
        document.getElementById('banco').value = dados.banco || '';
        document.getElementById('ag').value = dados.agencia || '';
        document.getElementById('cc').value = dados.conta || '';
        preencherCheckboxes('servicos', dados.servicosOferecidos);
        preencherCheckboxes('produtos', dados.produtosVenda);
        preencherCheckboxes('localServico', dados.locaisPrestacao);
        preencherCheckboxes('retiradaProduto', dados.formasRetirada);
    }

    async function carregarCadastroExistente() {
        if (carregamentoCadastroEmAndamento) {
            return;
        }

        carregamentoCadastroEmAndamento = true;
        let registro = null;
        let docId = null;

        try {
            const docDireto = await db.collection('usuarios').doc(idGerado).get();
            if (docDireto.exists) {
                registro = docDireto.data();
                docId = docDireto.id;
            } else {
                const busca = await db.collection('usuarios').where('idSistema', '==', idGerado).limit(1).get();
                if (!busca.empty) {
                    const doc = busca.docs[0];
                    registro = doc.data();
                    docId = doc.id;
                }
            }

            if (!registro) {
                cadastroCarregado = null;
                idDocFirebase = null;
                edicaoLiberada = true;
                aplicarPermissoesCadastro();
                return;
            }

            cadastroCarregado = registro;
            idDocFirebase = docId;
            preencherFormulario(registro);
            edicaoLiberada = false;
            aplicarPermissoesCadastro();
        } finally {
            carregamentoCadastroEmAndamento = false;
        }
    }

    function mudarTipo() {
        const tipo = document.getElementById('tipoConta').value;
        document.getElementById('labelDoc').innerText = tipo === 'PJ' ? 'CNPJ' : 'CPF';
        document.getElementById('labelNome').innerText = tipo === 'PJ' ? 'Razão Social' : 'Nome Completo';
        document.getElementById('areaPJ').style.display = tipo === 'PJ' ? 'block' : 'none';
    }

    async function buscarCEP(valor) {
        const cep = valor.replace(/\D/g, '');
        if(cep.length === 8) {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const d = await res.json();
            if(!d.erro) {
                document.getElementById('rua').value = d.logradouro;
                document.getElementById('bairro').value = d.bairro;
                document.getElementById('cidade').value = d.localidade + "/" + d.uf;
                document.getElementById('numero').focus();
            }
        }
    }

    async function consultarCNPJ() {
        const tipo = document.getElementById('tipoConta').value;
        const doc = document.getElementById('documento').value.replace(/\D/g, '');
        if(tipo === 'PJ' && doc.length === 14) {
            document.getElementById('loadCnpj').style.display = 'block';
            try {
                const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${doc}`);
                const d = await res.json();
                document.getElementById('nome').value = d.razao_social;
                document.getElementById('fantasia').value = d.nome_fantasia || d.razao_social;
                document.getElementById('cep').value = d.cep;
                buscarCEP(d.cep);
            } catch(e) { alert("Erro ao consultar CNPJ."); }
            finally { document.getElementById('loadCnpj').style.display = 'none'; }
        }
    }

    async function salvarCadastro() {
        if (!podeGerenciarCadastro()) {
            alert('Somente o dono do perfil pode alterar estes dados.');
            return;
        }

        const btn = document.querySelector('.btn-save');
        const textoOriginalBotao = btn ? btn.textContent : 'SALVAR E IR PARA PREÇOS';
        if (btn && btn.disabled) {
            return;
        }

        if (window.MyHairPermissoes) {
            await window.MyHairPermissoes.solicitarPermissoesBasicas();
        }

        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;
        const email = document.getElementById('email').value.trim();
        const cidadeUfBruta = document.getElementById('cidade').value.trim();
        const partesCidadeUf = cidadeUfBruta.split('/').map((item) => item.trim()).filter(Boolean);
        const cidadeNome = partesCidadeUf[0] || cidadeUfBruta;
        const uf = partesCidadeUf[1] || '';
        const whats = document.getElementById('whats').value;

        if (!email) {
            alert("Informe o e-mail para criar a conta.");
            return;
        }

        if (senha !== confirmar) {
            alert("As senhas não coincidem!");
            return;
        }

        if (btn) {
            btn.disabled = true;
            btn.innerText = "SALVANDO...";
        }

        // Coletar Arrays de Seleção
        const servicos = Array.from(document.querySelectorAll('input[name="servicos"]:checked')).map(cb => cb.value);
        const produtos = Array.from(document.querySelectorAll('input[name="produtos"]:checked')).map(cb => cb.value);
        const locais = Array.from(document.querySelectorAll('input[name="localServico"]:checked')).map(cb => cb.value);
        const retiradas = Array.from(document.querySelectorAll('input[name="retiradaProduto"]:checked')).map(cb => cb.value);
        
        const dados = {
            idSistema: idGerado,
            tipoConta: document.getElementById('tipoConta').value,
            servicosOferecidos: servicos,
            produtosVenda: produtos,
            locaisPrestacao: locais,
            formasRetirada: retiradas,
            documento: document.getElementById('documento').value,
            nome: document.getElementById('nome').value,
            fantasia: document.getElementById('fantasia').value || "",
            boasVindas: document.getElementById('boasVindas').value.trim(),
            whats: whats,
            whatsapp: whats,
            email: email,
            cep: document.getElementById('cep').value,
            endereco: document.getElementById('rua').value,
            rua: document.getElementById('rua').value,
            numero: document.getElementById('numero').value,
            complemento: document.getElementById('complemento').value,
            bairro: document.getElementById('bairro').value,
            cidade: cidadeNome,
            uf: uf,
            banco: document.getElementById('banco').value,
            agencia: document.getElementById('ag').value,
            conta: document.getElementById('cc').value,
            dataRegistro: new Date().toISOString()
        };

        try {
            if (idDocFirebase) {
                await db.collection("usuarios").doc(idDocFirebase).update(dados);
                alert("Cadastro atualizado!");
            } else {
                await auth.createUserWithEmailAndPassword(email, senha);
                const docRef = await db.collection("usuarios").add(dados);
                idDocFirebase = docRef.id;
                alert("Cadastro realizado com sucesso!");
            }
            window.location.href = "perfil.html";
        } catch(e) {
            if (e && e.code === 'auth/operation-not-allowed') {
                alert("Erro: login por E-mail/Senha desativado no Firebase. Ative em Authentication > Sign-in method > Email/Password.");
            } else {
                alert("Erro ao salvar: " + (e.code || e.message));
            }
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.innerText = textoOriginalBotao;
            }
        }
    }

    function habilitarEdicao() {
        if (!podeGerenciarCadastro()) {
            alert('Somente o dono do perfil pode editar estes dados.');
            return;
        }
        edicaoLiberada = true;
        aplicarPermissoesCadastro();
        alert("Modo edição ativado.");
        document.getElementById('nome').focus();
    }

    async function excluirCadastro() {
        if (!podeGerenciarCadastro()) {
            alert('Somente o dono do perfil pode excluir esta conta.');
            return;
        }
        if (!idDocFirebase) return alert("Salve o cadastro antes de excluir.");
        if (confirm("Deseja realmente apagar sua conta?")) {
            try {
                await db.collection("usuarios").doc(idDocFirebase).delete();
                alert("Conta excluída.");
                window.location.href = "index.html";
            } catch (e) { alert("Erro ao excluir."); }
        }
    }

    auth.onAuthStateChanged(() => {
        carregarCadastroExistente().catch((error) => {
            console.error('Erro ao carregar cadastro:', error);
            aplicarPermissoesCadastro();
        });
    });

    if (window.MyHairPermissoes) {
        window.MyHairPermissoes.initPainelPermissoes();
    }
</script>
</body>
</html>
