<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Serviços</title>
        <script src="scripts/fechar_app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="scripts/myhair_core.js"></script>
    <style>
        :root { --pink: #fce4ec; --blue: #b3e5fc; --dark-blue: #0288d1; --cream: #fffaf6; --ink: #213142; --soft-ink: #667587; --line: #dbe7f1; --shadow-lg: 0 24px 48px rgba(62, 85, 110, 0.14); --shadow-md: 0 12px 24px rgba(62, 85, 110, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top left, rgba(255,255,255,0.76), transparent 28%), radial-gradient(circle at bottom right, rgba(179,229,252,0.34), transparent 24%), linear-gradient(160deg, var(--cream) 0%, var(--pink) 100%); margin: 0; min-height: 100vh; padding: 24px; color: var(--ink); }
        body.conteudo-protegido { user-select: none; -webkit-user-select: none; }
        .page { max-width: 960px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: var(--shadow-lg); padding: 18px; border: 1px solid rgba(255,255,255,0.75); }
        .topo { display: flex; justify-content: space-between; align-items: center; gap: 10px; border-bottom: 1px solid #edf1f4; padding-bottom: 12px; margin-bottom: 14px; }
        h1 { margin: 0; font-size: 24px; }
        .btn-voltar { text-decoration: none; border: 1px solid #cfe7ff; background: #eef7ff; color: #0a5a91; border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: bold; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
        .acoes-topo { display: flex; gap: 8px; align-items: center; }
        .btn-agendar { text-decoration: none; border: 1px solid #9fd8f5; background: linear-gradient(135deg, #9fdff9, #7ecceb); color: #053b5c; border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: bold; box-shadow: 0 8px 18px rgba(18, 89, 132, 0.14); transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease; }
        .sub { font-size: 14px; color: var(--soft-ink); margin: 0 0 12px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.92); border-radius: 14px; overflow: hidden; }
        th { text-align: left; background: #f5fbff; color: #35516b; padding: 10px; font-size: 13px; }
        td { padding: 10px; border-top: 1px solid #edf1f4; font-size: 13px; }
        .vazio { color: #6d7d8b; font-size: 13px; margin: 10px 0 0; }
        .btn-voltar:hover, .btn-agendar:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(62, 85, 110, 0.12); filter: brightness(1.01); }

        @media (max-width: 720px) {
            body { padding: 12px; }
            .card { padding: 14px; border-radius: 16px; }
            .topo { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div id="google_translate_element" style="margin-bottom: 16px;"></div>
<div class="page">
    <div class="card">
        <div class="topo">
<!-- Botão duplicado removido: Fechar Aplicativo -->
            <h1 style="color:#13212c; margin-bottom: 5px; font-size: 30px; letter-spacing: -1.4px;">MY HAIR</h1>
            <div class="subtitle" style="color: #5f6b76; font-size: 12px; margin-bottom: 18px; letter-spacing: 0.2px;">Serviços</div>
            <div class="acoes-topo">
                <a id="btnAgendar" href="#" class="btn-agendar">AGENDAR</a>
                <div style="display:flex; gap:10px;">
                    <a href="visaogeral.html" class="btn-voltar">VOLTAR</a>
                    <a href="perfil.html" class="btn-voltar">MEU PERFIL</a>
                    <button type="button" class="btn-voltar" onclick="salvarEDepoisFecharApp()">Salvar e Fechar</button>
                </div>
            </div>
        </div>
        <p id="subtitulo" class="sub">Carregando dados do prestador...</p>
        <div id="conteudo"></div>
    </div>
</div>

<script>
    const { flagDevAtiva, formatarMoeda } = window.MyHairCore;

    window.MyHairCore.ensureFirebaseApp();

    const db = firebase.firestore();
    const params = new URLSearchParams(window.location.search);
    const prestadorId = params.get('prestadorId') || '';
    const prestadorNome = params.get('prestadorNome') ? decodeURIComponent(params.get('prestadorNome')) : 'Prestador';

    const modoDesenvolvedorAtivo = flagDevAtiva(params.get('dev'))
        || flagDevAtiva(params.get('modo'))
        || flagDevAtiva(localStorage.getItem('myhair_modo_dev'));

    function estaEmModoDesenvolvedor() {
        return modoDesenvolvedorAtivo;
    }

    function aplicarProtecaoConteudo() {
        document.body.classList.toggle('conteudo-protegido', !estaEmModoDesenvolvedor());
        const voltar = document.querySelector('.btn-voltar');
        const agendar = document.getElementById('btnAgendar');
        const sufixoDev = estaEmModoDesenvolvedor() ? '&dev=1' : '';
        if (voltar) {
            voltar.href = estaEmModoDesenvolvedor() ? 'visaogeral.html?dev=1' : 'visaogeral.html';
        }
        if (agendar) {
            if (prestadorId) {
                agendar.href = `agendamento.html?prestadorId=${encodeURIComponent(prestadorId)}&prestadorNome=${encodeURIComponent(prestadorNome)}${sufixoDev}`;
            } else {
                agendar.href = '#';
                agendar.setAttribute('aria-disabled', 'true');
                agendar.style.pointerEvents = 'none';
                agendar.style.opacity = '0.65';
            }
        }
    }

    function renderizarTabela(servicos) {
        const conteudo = document.getElementById('conteudo');
        if (!Array.isArray(servicos) || !servicos.length) {
            conteudo.innerHTML = '<p class="vazio">Este prestador ainda não cadastrou serviços.</p>';
            return;
        }

        const linhas = servicos.map((servico) => `
            <tr>
                <td>${servico.nome || '-'}</td>
                <td>${servico.preco === '-' ? '-' : formatarMoeda(servico.preco)}</td>
                <td>${servico.tempo || '-'}</td>
            </tr>
        `).join('');

        conteudo.innerHTML = `
            <table>
                <thead>
                    <tr><th>Serviço</th><th>Preço</th><th>Tempo</th></tr>
                </thead>
                <tbody>${linhas}</tbody>
            </table>
        `;
    }

    async function carregar() {
        document.getElementById('subtitulo').textContent = `${prestadorNome}`;
        if (!prestadorId) {
            document.getElementById('conteudo').innerHTML = '<p class="vazio">Prestador não informado.</p>';
            return;
        }

        let registro = null;

        const docDireto = await db.collection('usuarios').doc(prestadorId).get();
        if (docDireto.exists) {
            registro = docDireto.data();
        } else {
            const busca = await db.collection('usuarios').where('idSistema', '==', prestadorId).limit(1).get();
            if (!busca.empty) {
                registro = busca.docs[0].data();
            }
        }

        if (!registro) {
            document.getElementById('conteudo').innerHTML = '<p class="vazio">Prestador não encontrado.</p>';
            return;
        }

        const servicos = Array.isArray(registro.tabelaServicos) && registro.tabelaServicos.length
            ? registro.tabelaServicos.map((servico) => ({
                nome: servico.nome,
                preco: Number.isFinite(Number(servico.preco)) ? Number(servico.preco) : servico.preco,
                tempo: servico.tempo,
            }))
            : (Array.isArray(registro.servicosOferecidos)
                ? registro.servicosOferecidos.map((servico) => ({ nome: servico, preco: '-', tempo: '-' }))
                : []);

        renderizarTabela(servicos);
    }

    aplicarProtecaoConteudo();

    ['copy', 'cut', 'contextmenu', 'selectstart', 'dragstart'].forEach((evento) => {
        document.addEventListener(evento, (e) => {
            if (!estaEmModoDesenvolvedor()) {
                e.preventDefault();
            }
        });
    });

    carregar().catch((error) => {
        console.error(error);
        document.getElementById('conteudo').innerHTML = '<p class="vazio">Erro ao carregar serviços.</p>';
    });
</script>
</body>
</html>
