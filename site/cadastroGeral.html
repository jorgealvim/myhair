<body>

            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Cadastro Geral</h2>
            <div id="listaCadastros"></div>
        </section>
    </main>
    <script>
    // Exibe os cadastros salvos no localStorage
    document.addEventListener('DOMContentLoaded', function() {
        const lista = document.getElementById('listaCadastros');
        let cadastros = localStorage.getItem('cadastroGeral');
        cadastros = cadastros ? JSON.parse(cadastros) : [];
        if (cadastros.length === 0) {
            lista.innerHTML = '<p>Nenhum cadastro encontrado.</p>';
        } else {
            lista.innerHTML = '<ul>' + cadastros.map(c => `<li>${c.nome} - ${c.email || c.cnpj || c.cpf}</li>`).join('') + '</ul>';
        }
    });
    </script>

</body>
