<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAIR - Cadastro Cliente</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="scripts/myhair_core.js"></script>
    <script src="scripts/app_permissoes.js"></script>
    <style>
        :root { --pink: #fce4ec; --blue: #b3e5fc; --cream: #fffaf6; --ink: #223142; --soft-ink: #667587; --line: #dbe7f1; --shadow-lg: 0 24px 48px rgba(62, 85, 110, 0.14); --shadow-md: 0 12px 24px rgba(62, 85, 110, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 28%), radial-gradient(circle at bottom right, rgba(179,229,252,0.35), transparent 24%), linear-gradient(160deg, var(--cream) 0%, var(--pink) 100%); margin: 0; color: var(--ink); min-height: 100vh; padding: 20px; }
        .login-card { width: 100%; max-width: 360px; margin: 16px auto; background: rgba(255,255,255,0.94); backdrop-filter: blur(10px); padding: 20px; border-radius: 18px; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.75); box-sizing: border-box; }
        header { background-color: transparent; padding: 0 0 14px; text-align: center; border-bottom: 1px solid #eef3f7; margin-bottom: 14px; }
        header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        header p { margin: 4px 0 0; font-size: 12px; color: var(--soft-ink); }
        main { padding: 0; max-width: 320px; margin: 0 auto; }
        .form-card { background: linear-gradient(180deg, #ffffff, #fbfdff); padding: 16px; border-radius: 14px; box-shadow: var(--shadow-md); border: 1px solid var(--line); }
        h2 { font-size: 13px; border-bottom: 2px solid #b3e5fc; padding-bottom: 6px; margin-top: 0; text-transform: uppercase; text-align: center; letter-spacing: 0.4px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 11px; }
        input { width: 100%; padding: 10px 11px; margin-top: 4px; border: 1px solid #d7e2eb; border-radius: 10px; box-sizing: border-box; font-size: 13px; background: rgba(255,255,255,0.96); transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease; }
        .btn-save { width: 100%; padding: 12px; background: linear-gradient(135deg, #9fdff9, #7ecceb); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 14px; font-size: 14px; color: #043a5a; box-shadow: 0 8px 18px rgba(18, 89, 132, 0.14); transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease; }
        .btn-voltar { display: inline-block; margin: 0 0 12px; text-decoration: none; background: #f3f3f3; color: #4c4c4c; border-radius: 10px; padding: 8px 12px; font-size: 11px; font-weight: bold; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
        .links-aux { text-align: center; margin-top: 10px; font-size: 12px; }
        .links-aux a { color: #0288d1; text-decoration: none; font-weight: bold; }
        .links-aux a:hover { text-decoration: underline; }
        input:focus { outline: none; border-color: #92cbe8; box-shadow: 0 0 0 4px rgba(179,229,252,0.36); transform: translateY(-1px); }
        .btn-save:hover, .btn-voltar:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(62, 85, 110, 0.12); filter: brightness(1.01); }

        @media (max-width: 420px) {
            body { padding: 12px; }
            .login-card { padding: 16px; border-radius: 16px; }
            main { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="login-card" style="margin: 16px auto;">
  <header><h1>MY HAIR</h1><p>Cadastro de Cliente</p></header>
  <main>
            <a href="index.html" class="btn-voltar">VOLTAR</a>
      <div class="form-card">
          <form id="formCliente">
              <h2>Crie sua conta</h2>
              <label>NOME COMPLETO</label>
              <input type="text" id="nomeCliente" placeholder="Digite seu nome">
              <label>CPF</label>
              <input type="text" id="cpfCliente" placeholder="000.000.000-00">
              <label>WHATSAPP</label>
              <input type="text" id="whatsCliente" placeholder="(00) 00000-0000">
              <label>E-MAIL</label>
              <input type="email" id="emailCliente" placeholder="seuemail@exemplo.com">
              <label>CRIAR SENHA</label>
              <input type="password" id="senhaCliente" placeholder="******">
              <button type="button" class="btn-save" onclick="salvarCliente()">FINALIZAR CADASTRO</button>
              <div class="links-aux">
                  Já tem conta? <a href="index.html">Fazer Login</a>
              </div>
          </form>
      </div>
  </main>
</div>

<script>
    window.MyHairCore.ensureFirebaseApp();
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function salvarCliente() {
        const nome = document.getElementById('nomeCliente').value;
        const cpf = document.getElementById('cpfCliente').value;
        const whats = document.getElementById('whatsCliente').value;
        const email = document.getElementById('emailCliente').value.trim();
        const senha = document.getElementById('senhaCliente').value;

        if (!nome || !cpf || !whats || !email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const btn = document.querySelector('.btn-save');
        btn.innerText = "CADASTRANDO...";
        btn.disabled = true;

        const dados = {
            tipoUsuario: "CLIENTE",
            nome: nome,
            cpf: cpf,
            whatsapp: whats,
            email: email,
            dataCadastro: new Date().toISOString()
        };

        try {
            if (window.MyHairPermissoes) {
                await window.MyHairPermissoes.solicitarPermissoesBasicas();
            }
            const credencial = await auth.createUserWithEmailAndPassword(email, senha);
            const uid = credencial?.user?.uid || '';

            if (uid) {
                await db.collection("clientes").doc(uid).set({
                    ...dados,
                    uid,
                }, { merge: true });
                localStorage.setItem('usuarioID', uid);
                localStorage.setItem('myhair_tipo_usuario', 'cliente');
            } else {
                await db.collection("clientes").add(dados);
            }
            alert("Cadastro realizado com sucesso! Bem-vindo ao MY HAIR.");
            window.location.href = "visaogeral.html";
        } catch(e) {
            if (e && e.code === 'auth/operation-not-allowed') {
                alert("Erro: login por E-mail/Senha desativado no Firebase. Ative em Authentication > Sign-in method > Email/Password.");
            } else {
                alert("Erro ao realizar cadastro: " + (e.code || e.message));
            }
            btn.innerText = "FINALIZAR CADASTRO";
            btn.disabled = false;
        }
    }

    if (window.MyHairPermissoes) {
        window.MyHairPermissoes.initPainelPermissoes();
    }
</script>
</body>
</html>
